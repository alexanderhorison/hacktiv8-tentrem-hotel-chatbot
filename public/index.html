<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hotel Tentrem — Booking Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="chat-wrapper">
      <div class="chat-container">

        <!-- Header -->
        <div class="chat-header">
          <!-- Avatar: hotel building icon -->
          <span class="avatar">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M3 21h18M3 7l9-4 9 4M4 7v14M20 7v14M8 11h1M8 15h1M15 11h1M15 15h1M11 21v-5h2v5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
          <div class="header-info">
            <p class="header-title">Hotel Tentrem</p>
            <p class="header-sub">
              <span class="dot"></span>
              <span>SARI — Virtual Concierge</span>
            </p>
          </div>
          <!-- Badge -->
          <span class="badge">AI</span>
        </div>

        <!-- Separator -->
        <div class="separator"></div>

        <!-- Messages -->
        <div id="chat-box">
          <div class="welcome-msg">
            <div class="welcome-avatar">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M3 21h18M3 7l9-4 9 4M4 7v14M20 7v14M8 11h1M8 15h1M15 11h1M15 15h1M11 21v-5h2v5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <p class="welcome-title">Sugeng rawuh di Hotel Tentrem 🙏</p>
            <p class="welcome-sub">Saya SARI, concierge virtual kami. Siap membantu Bapak/Ibu memeriksa ketersediaan kamar di Jakarta, Semarang, dan Yogyakarta.</p>
          </div>
        </div>

        <!-- Separator -->
        <div class="separator"></div>

        <!-- Input -->
        <div class="chat-input-area">
          <form id="chat-form">
            <input
              type="text"
              id="user-input"
              placeholder="Tanyakan ketersediaan kamar, harga, atau fasilitas hotel..."
              autocomplete="off"
            />
            <button type="submit" id="send-btn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M22 2L11 13" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M22 2L15 22l-4-9-9-4 20-7z" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              Kirim
            </button>
          </form>
        </div>

      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
